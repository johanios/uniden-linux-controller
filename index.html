<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC125XLT Live</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'JetBrains Mono', monospace;
        background: #121212;
        color: #eee;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    h1 {
        font-size: 1.8em;
        margin-bottom: 10px;
        color: #ffcc00;
    }

    .panel {
        background: #1e1e1e;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }

    pre#status {
        background: darkslategray;
        padding: 10px;
        border-radius: 8px;
        white-space: pre-wrap;
        font-size: 14px;
        margin: 0;
    }

    .squelch-mute {
        display: flex;
        gap: 20px;
        margin-top: 8px;
        font-weight: bold;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .control-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
    }

    .channel-control {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    button {
        padding: 10px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        background: #333;
        color: #eee;
        transition: all 0.2s;
    }

    button:hover {
        background: #ffcc00;
        color: #121212;
    }

    input[type=number] {
        width: 70px;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #222;
        color: #eee;
    }

    .checkbox-label {
        display: flex;
        align-items: center; /* checkbox + text */
        gap: 6px;
        cursor: pointer;
    }

    .tooltip {
        display: block;       /* place under label */
        margin-left: 24px;
        font-size: 12px;
        color: #aaa;
    }

    .keypad button {
        min-width: 120px;
        min-height: 50px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
    }
    
    #keypad_F {
        background-color: chocolate;
    }
    
    h2 {
        margin-bottom: 0;
        margin-top: 36px;
    }
    
    .keypad button {
        margin: 2px;
    }
</style>
</head>
<body>

<h1>UBC125XLT Live Status</h1>
<h2>Screen</h2>
<div class="panel">
    <pre id="status">Loading...</pre>
    <div class="squelch-mute">
        <div id="squelchStatus">Squelch: N/A</div>
        <div id="muteStatus">Mute: N/A</div>
    </div>
</div>

<h2>Controls</h2>
<div class="panel controls">
    <!-- Rad 1: Backlight -->
    <div class="control-row">
        <button onclick="sendCommand('backlight_on')">Backlight On</button>
        <button onclick="sendCommand('backlight_off')">Backlight Off</button>
    </div>

    <!-- Rad 2: Auto Recording -->
    <div class="control-row">
        <label class="checkbox-label">
            <input type="checkbox" id="recordToggle" onchange="toggleRecording()">
            Auto Recording
        </label>
        <span class="tooltip">Automatically records when squelch is open.</span>
    </div>

    <div class="control-row">
        <label class="checkbox-label">
            <input type="checkbox" id="lockoutToggle" onchange="toggleAutoLockout()">
            Auto Lockout
        </label>
        <span class="tooltip">Automatically locks out a channel if stuck >10s. Delay should be 2-5s on scanner.</span>
    </div>

</div>

<h2>Keypad</h2>
<div class="panel keypad" id="keypad"></div>

<h2>Jump to channel</h2>
<div class="panel channel-control">
    <label for="channelInput">Channel:</label>
    <input type="number" id="channelInput" min="1" max="500">
    <button onclick="goToChannel()">Go</button>
</div>

<script>
const availableKeys = [
    '<', '^', '>', 'H', '1','2','3','S','4','5','6','R','7','8','9','L','E','0','.','P','F'
];

const keyLabels = {
    '<': 'Jog left', '^': 'Jog press', '>': 'Jog right', 'H': 'Hold (CC)',
    '1': '1 (Pri)','2':'2','3':'3 (Step)','S':'Scan','4':'4 (<)','5':'5','6':'6 (>)',
    'R':'Srch (Svc)','7':'7 (Beep)','8':'8','9':'9 (Mod)','L':'L/O','E':'Enter (Pgm)',
    '0':'0','.':'. (Clr)','P':'Power (Backlight)','F':'Func'
};

const keypadContainer = document.getElementById('keypad');

function sanitizeKey(key) {
    return key.replace(/[^a-zA-Z0-9]/g, match => '_' + match.charCodeAt(0) + '_');
}

// Skapa knappar med exakt samma 3+4 radlayout som innan
availableKeys.forEach((key, index) => {
    const btn = document.createElement('button');
    btn.innerText = keyLabels[key] || key;
    btn.onclick = () => sendKey(key);
    btn.id = 'keypad_' + sanitizeKey(key);
    keypadContainer.appendChild(btn);

    if (index === 2) keypadContainer.appendChild(document.createElement('br'));
    else if (index > 2 && (index - 3 + 1) % 4 === 0) keypadContainer.appendChild(document.createElement('br'));
});

async function sendCommand(action) {
    await fetch('/command', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action})
    });
    updateStatus();
}

async function sendKey(key) {
    await fetch('/command', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'key_'+key})
    });
    updateStatus();
}

function goToChannel() {
    const ch = document.getElementById('channelInput').value;
    if(ch) fetch('/command',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'set_channel',value:ch})
    }).then(()=>updateStatus());
}

async function updateStatus() {
    try {
        const res = await fetch('/status');
        const data = await res.json();
        let screenHtml = "";
        if(data.screen && data.screen.lines){
            data.screen.lines.forEach(line=>{
                const text = line.text||"";
                const fmt = line.formatting||"";
                for(let i=0;i<text.length;i++){
                    screenHtml += fmt[i]==='*'?"<b>"+text[i]+"</b>":text[i]===' '?"&nbsp;":text[i];
                }
                screenHtml += "<br>";
            });
        }
        document.getElementById('status').innerHTML = `${screenHtml}`;
        document.getElementById('squelchStatus').innerText = 'Squelch: ' + (data.squelch?'ON':'OFF');
        document.getElementById('muteStatus').innerText = 'Mute: ' + (data.mute?'ON':'OFF');
        document.getElementById('recordToggle').checked = data.recording_enabled;
        document.getElementById('lockoutToggle').checked = data.auto_lockout_enabled;
    } catch(e){
        document.getElementById('status').innerText = 'Fel: '+e;
    }
}

async function toggleRecording() {
    const enabled = document.getElementById('recordToggle').checked;
    await fetch('/command',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:"set_recording_enabled",value:enabled?'on':'off'})
    });
}

async function toggleAutoLockout() {
    const enabled = document.getElementById('lockoutToggle').checked;
    await fetch('/command',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:"set_auto_lockout",value:enabled?'on':'off'})
    });
}

setInterval(updateStatus, 350);
updateStatus();
</script>

</body>
</html>
